<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" id="theme-color-meta" content="#f8fafc">
    
    <title>Тренировки</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-teal-200 dark:selection:bg-teal-900">

    <header class="sticky top-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-3 pb-2">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl md:text-2xl font-black tracking-tight text-slate-800 dark:text-slate-100">Тренировки</h1>
                <div class="flex items-center gap-2">
                    <button id="install-btn" onclick="installApp()" class="hidden p-2.5 rounded-full bg-teal-100 dark:bg-teal-900/40 text-teal-600 dark:text-teal-400 hover:bg-teal-200 dark:hover:bg-teal-800 transition-colors focus:outline-none touch-manipulation shadow-sm flex items-center gap-1" title="Установить приложение">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    </button>
                    <button id="edit-mode-toggle" onclick="toggleEditMode()" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none touch-manipulation shadow-sm flex items-center gap-1" title="Режим редактирования">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.89l12.683-12.683z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 7.125L16.875 4.5" /></svg>
                    </button>
                    <button id="theme-toggle" class="p-2.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-amber-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none touch-manipulation shadow-sm">
                        <span id="theme-icon-light" class="block dark:hidden text-lg leading-none">🌙</span>
                        <span id="theme-icon-dark" class="hidden dark:block text-lg leading-none">☀️</span>
                    </button>
                </div>
            </div>
            <nav class="flex overflow-x-auto no-scrollbar space-x-6 pb-1 -mx-4 px-4 sm:mx-0 sm:px-0" id="main-nav"></nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 pb-24 safe-pb relative">
        <div id="views-container" class="relative min-h-[400px]"></div>
    </main>

    <div id="timer-widget" class="fixed bottom-6 right-4 sm:right-6 z-40 flex items-center gap-2 transition-all duration-300 translate-y-0">
        <div id="timer-controls" class="hidden bg-slate-800 dark:bg-white rounded-full shadow-lg p-1.5 flex items-center gap-1 border border-slate-700 dark:border-slate-200">
            <button onclick="adjustTimer(-10)" class="w-10 h-10 rounded-full flex items-center justify-center bg-rose-500/10 text-rose-400 dark:text-rose-500 font-bold active:bg-rose-500/20 touch-manipulation transition-colors">-10</button>
            <div class="relative flex items-center justify-center w-[90px]" title="Нажми, чтобы ввести время">
                <div id="timer-display" onclick="enableTimerEdit()" class="font-mono text-xl font-bold text-white dark:text-slate-900 cursor-pointer w-full text-center hover:text-teal-400 transition-colors">01:30</div>
                <div id="timer-edit-container" class="hidden flex items-center justify-center w-full">
                    <input id="timer-input-combined" type="text" inputmode="numeric" placeholder="00:00" class="w-[80px] h-8 bg-slate-700 dark:bg-slate-200 text-white dark:text-slate-900 text-center font-mono text-xl font-bold rounded outline-none focus:ring-2 focus:ring-teal-500/50 p-0 shadow-inner" oninput="handleCombinedInput(this)" onblur="saveTimerEdit()" onkeydown="if(event.key==='Enter') saveTimerEdit()">
                </div>
            </div>
            <button onclick="adjustTimer(30)" class="w-10 h-10 rounded-full flex items-center justify-center bg-teal-500/10 text-teal-400 dark:text-teal-600 font-bold active:bg-teal-500/20 touch-manipulation transition-colors">+30</button>
            <div class="w-px h-6 bg-slate-600 dark:bg-slate-300 mx-0.5"></div>
            <button id="timer-play-pause-btn" onclick="togglePlayPause()" class="w-10 h-10 rounded-full bg-slate-700 dark:bg-slate-100 flex items-center justify-center text-slate-300 dark:text-slate-700 active:scale-95 touch-manipulation transition-colors">
                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" /></svg>
                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" /></svg>
            </button>
            <button onclick="stopTimer()" class="w-10 h-10 rounded-full bg-slate-700 dark:bg-slate-100 flex items-center justify-center text-rose-400 dark:text-rose-500 active:scale-95 touch-manipulation transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path fill-rule="evenodd" d="M4.5 7.5a3 3 0 013-3h9a3 3 0 013 3v9a3 3 0 01-3 3h-9a3 3 0 01-3-3v-9z" clip-rule="evenodd" /></svg>
            </button>
        </div>
        <button id="timer-toggle-btn" onclick="toggleTimer()" class="w-14 h-14 bg-teal-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-teal-500 transition-all active:scale-90 touch-manipulation border-2 border-white dark:border-slate-800 relative z-10">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </button>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-2xl shadow-xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]" id="history-modal-content">
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center flex-shrink-0">
                <h3 class="font-bold text-slate-900 dark:text-white truncate pr-2" id="history-title">История</h3>
                <button onclick="closeHistory()" class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-full active:bg-slate-100 dark:active:bg-slate-700 transition-colors focus:outline-none flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="history-chart-container" class="hidden p-3 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 flex-shrink-0 h-32">
                <canvas id="miniHistoryChart"></canvas>
            </div>
            <div class="p-4 overflow-y-auto no-scrollbar flex-grow" id="history-list"></div>
        </div>
    </div>

    <div id="edit-ex-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]" id="edit-ex-modal-content">
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center flex-shrink-0">
                <h3 class="font-bold text-slate-900 dark:text-white">Редактор упражнения</h3>
                <button onclick="closeEditModal()" class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-full active:bg-slate-100 dark:active:bg-slate-700 transition-colors focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-4 overflow-y-auto no-scrollbar flex-grow flex flex-col gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">Группа мышц / Блок</label>
                    <input type="text" id="draft-muscle" oninput="updateDraftMuscle(this.value)" class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:outline-none focus:border-teal-500 text-sm font-bold">
                </div>
                <div class="pt-2">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400">Варианты (Потяните за ☰ для сортировки)</label>
                        <button onclick="addDraftVariant()" class="text-xs font-bold text-teal-600 dark:text-teal-400 hover:underline">+ Добавить</button>
                    </div>
                    <div id="draft-variants-container" class="flex flex-col gap-3"></div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-200 dark:border-slate-700 flex justify-between gap-3 bg-slate-50 dark:bg-slate-800/50 flex-shrink-0">
                <button onclick="deleteExercise()" class="py-2.5 px-4 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 text-sm font-bold rounded-lg hover:bg-rose-200 dark:hover:bg-rose-900/50 transition-colors shadow-sm">Удалить всё</button>
                <div class="flex gap-3">
                    <button onclick="closeEditModal()" class="py-2.5 px-4 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 text-sm font-bold rounded-lg transition-colors shadow-sm">Отмена</button>
                    <button onclick="saveEditModal()" class="py-2.5 px-5 bg-teal-600 hover:bg-teal-700 text-white text-sm font-bold rounded-lg transition-colors shadow-sm">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
