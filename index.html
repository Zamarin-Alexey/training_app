<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" id="theme-color-meta" content="#f8fafc">
    
    <script>
        (function() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#0d9488';
            ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '900 300px sans-serif';
            ctx.fillText('T', size / 2, size / 2 + 10);
            
            const iconUrl = canvas.toDataURL('image/png');

            const link = document.createElement('link');
            link.rel = 'icon';
            link.href = iconUrl;
            document.head.appendChild(link);

            const appleLink = document.createElement('link');
            appleLink.rel = 'apple-touch-icon';
            appleLink.href = iconUrl;
            document.head.appendChild(appleLink);

            const manifest = {
                "name": "План тренировок",
                "short_name": "Тренировки",
                "start_url": "./",
                "display": "standalone",
                "background_color": "#f8fafc",
                "theme_color": "#0d9488", 
                "icons": [
                    { "src": iconUrl, "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
                    { "src": iconUrl, "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
                ]
            };
            const manifestStr = 'data:application/manifest+json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = manifestStr;
            document.head.appendChild(manifestLink);
        })();
    </script>
    
    <title>Тренировки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }
        .chart-container { position: relative; width: 100%; max-width: 800px; margin-left: auto; margin-right: auto; height: 280px; }
        @media (min-width: 768px) { .chart-container { height: 400px; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { border-bottom: 3px solid #0d9488; color: #0d9488; font-weight: 700; }
        .dark .tab-active { border-bottom: 3px solid #2dd4bf; color: #2dd4bf; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #64748b; font-weight: 500; }
        .dark .tab-inactive { color: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 2rem); }
        
        input[type="number"], input[type="text"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        @keyframes timerPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
        .timer-done { animation: timerPulse 1s infinite; background-color: #ef4444 !important; }
    </style>
</head>

                </button>

    <script>
        function updateMetaThemeColor(isDark) {
            const metaTheme = document.getElementById('theme-color-meta');
            if (metaTheme) metaTheme.setAttribute('content', isDark ? '#0f172a' : '#f8fafc');
        }

        const Storage = {
            getKey: (exId, variantIndex) => `freeride_${exId}_${variantIndex}`,
            saveWeight: (exId, variantIndex, newWeight) => {
                const key = Storage.getKey(exId, variantIndex);
                let data = JSON.parse(localStorage.getItem(key) || '{"weight":"", "history":[]}');
                
                if (newWeight !== "" && newWeight !== data.weight) {
                    const today = new Date().toLocaleDateString('ru-RU');
                    if (!data.history) data.history = [];
                    
                    const lastEntry = data.history[data.history.length - 1];
                    if (lastEntry && lastEntry.date === today) {
                        lastEntry.weight = newWeight;
                    } else {
                        data.history.push({ date: today, weight: newWeight });
                    }
                }
                data.weight = newWeight;
                localStorage.setItem(key, JSON.stringify(data));
                if (myChartInstance && document.getElementById('targets').classList.contains('hidden') === false) renderChart(); 
            },
            load: (exId, variantIndex) => { return JSON.parse(localStorage.getItem(Storage.getKey(exId, variantIndex)) || '{"weight":"", "history":[]}'); }
        };

        const workoutData = {
            push: [
                { id: "pu_1", muscle: "Квадрицепс (База)", main: { name: "Жим ногами в тренажере", desc: "Амортизируем вес, не выпрямляем колени", sets: "4х8-12", target: "150" }, alt:  { name: "Жим по одной ноге", desc: "Критично для приземлений на одну ногу", sets: "3х10-12", target: "70" } },
                { id: "pu_2", muscle: "Квадрицепс / Баланс", main: { name: "Болгарский сплит-присед", desc: "Гантели в опущенных руках", sets: "3х8-10", target: "17.5" }, alt:  { name: "Выпады назад с гантелями", desc: "Щадящий вариант для коленей", sets: "3х10-12", target: "20" } },
                { id: "pu_3", muscle: "Икры (Контроль лыжи)", main: { name: "Жим носками в станке", desc: "Прямые колени. Полная растяжка", sets: "4х15-20", target: "100" }, alt:  { name: "Подъемы на носки сидя", desc: "Прокачивает камбаловидную мышцу", sets: "4х15-20", target: "40" } },
                { id: "pu_4", muscle: "Грудь (Толкающий верх)", main: { name: "Жим гантелей лежа", desc: "Безопасная траектория для плеч", sets: "4х8-10", target: "25" }, alt:  { name: "Жим гантелей (угол 30°)", desc: "Акцент на визуальную ширину", sets: "3х10-12", target: "22.5" } },
                { id: "pu_5", muscle: "Плечи (Средняя дельта)", main: { name: "Махи гантелями СИДЯ", desc: "Сидя исключаем раскачку поясницы", sets: "3х12-15", target: "12.5" }, alt:  { name: "Отведения на нижнем блоке", desc: "Постоянное напряжение дельты", sets: "3х12-15", target: "15" } },
                { id: "pu_6", muscle: "Трицепс (Руки)", main: { name: "Разгибания на блоке", desc: "Локти прижаты", sets: "3х12-15", target: "30" }, alt:  { name: "Французский жим гантелями", desc: "Лежа на скамье", sets: "3х10-12", target: "12" } },
                { id: "pu_7", muscle: "Кор (Антиразгибание)", main: { name: "RKC Планка", desc: "Напрягаем пресс и ягодицы", sets: "3х60 сек", target: "60", unit: "сек", ph: "Время" }, alt:  { name: "Мертвый жук (с отягощением)", desc: "Изометрия: держим гантели (2-4кг) над грудью или тянем нижний блок.", sets: "3х20", target: "5", unit: "кг", ph: "Вес (блок/гантели)" } }
            ],
            pull: [
                { id: "pl_1", muscle: "Ягодицы (База/Взрыв)", main: { name: "Ягодичный мост (Hip Thrust)", desc: "Мощный толчок тазом вверх", sets: "4х8-12", target: "110" }, alt:  { name: "Тяга блока между ног", desc: "Наклон с прямой спиной", sets: "3х12-15", target: "50" } },
                { id: "pl_2", muscle: "Бицепс бедра (Защита ПКС)", main: { name: "Сгибания ног лежа", desc: "Изолирует заднюю поверхность бедра", sets: "3х12-15", target: "50" }, alt:  { name: "Сгибания ног сидя", desc: "Меньше движения в поясницы", sets: "3х12-15", target: "55" } },
                { id: "pl_3", muscle: "Спина (Горизонталь)", main: { name: "Тяга гантелей (упор грудью)", desc: "Снятие нагрузки со спины", sets: "4х10-12", target: "22.5" }, alt:  { name: "Горизонтальная тяга блока", desc: "Вертикально, без раскачки", sets: "3х12", target: "65" } },
                { id: "pl_4", muscle: "Широчайшие (Вертикаль)", main: { name: "Подтягивания (гравитрон)", desc: "Полезная декомпрессия", sets: "3-4х8-10", target: "0" }, alt:  { name: "Вертикальная тяга к груди", desc: "Сводя лопатки", sets: "3х10-12", target: "65" } },
                { id: "pl_5", muscle: "Задняя дельта (Осанка)", main: { name: "Тяга каната к лицу (Face Pulls)", desc: "Включает вращатели плеча", sets: "3х15", target: "25" }, alt:  { name: "Обратные махи лежа", desc: "На наклонной скамье", sets: "3х12-15", target: "8" } },
                { id: "pl_6", muscle: "Бицепс (Руки)", main: { name: "Сгибания с гантелями сидя", desc: "С опорой на спинку", sets: "3х10-12", target: "15" }, alt:  { name: "Сгибания на нижнем блоке", desc: "Хват молотком (канат)", sets: "3х12-15", target: "35" } },
                { id: "pl_7", muscle: "Кор (Антиротация)", main: { name: "Жим Паллофа (на блоке)", desc: "Сопротивляемся боковому натяжению", sets: "3х10-12", target: "20" }, alt:  { name: "Боковая планка", desc: "Тело в прямую линию", sets: "3х45 сек", target: "60", unit: "сек", ph: "Время" } }
            ]
        };

        const exerciseState = {};
        let myChartInstance = null;

        function renderCards(dayId, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            workoutData[dayId].forEach((ex) => {
                if (typeof exerciseState[ex.id] === 'undefined') exerciseState[ex.id] = false;
                
                const isAlt = exerciseState[ex.id];
                const currentEx = isAlt ? ex.alt : ex.main;
                const variantIndex = isAlt ? 'B' : 'A'; 
                const variantLabel = isAlt ? 'Б' : 'А'; 
                const savedData = Storage.load(ex.id, variantIndex);
                
                const unit = currentEx.unit || "кг";
                const ph = currentEx.ph || "Рабочий вес";
                
                const cardBorder = isAlt ? 'border-amber-200 dark:border-amber-700/50' : 'border-slate-200 dark:border-slate-700';
                const tagColor = isAlt ? 'text-amber-700 dark:text-amber-500' : 'text-teal-700 dark:text-teal-400';
                const variantBadgeClass = isAlt ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300';
                
                const swapIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" /></svg>`;
                const historyIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;

                const cardHtml = `
                    <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border ${cardBorder} flex flex-col h-full transition-colors duration-300 relative group">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex flex-col gap-1.5">
                                <span class="text-[10px] md:text-xs font-black uppercase tracking-wider ${tagColor}">${ex.muscle}</span>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded w-max transition-colors ${variantBadgeClass}">Вариант ${variantLabel}</span>
                            </div>
                            <button onclick="toggleExercise('${dayId}', '${ex.id}', '${containerId}')" class="p-2 bg-slate-50 dark:bg-slate-700/50 hover:bg-slate-100 dark:hover:bg-slate-600 border border-slate-200 dark:border-slate-600 rounded-full text-slate-500 dark:text-slate-300 transition-all touch-manipulation active:scale-90 focus:outline-none">
                                ${swapIcon}
                            </button>
                        </div>
                        
                        <div class="flex-grow">
                            <h4 class="text-sm md:text-base font-bold text-slate-900 dark:text-slate-100 mb-1.5 leading-tight transition-colors">${currentEx.name}</h4>
                            <p class="text-[11px] md:text-xs text-slate-500 dark:text-slate-400 mb-5 leading-relaxed transition-colors">${currentEx.desc}</p>
                        </div>
                        
                        <div class="bg-slate-50 dark:bg-slate-900/40 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 transition-colors mt-auto relative">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex flex-col">
                                    <span class="text-[10px] uppercase font-bold text-slate-400 dark:text-slate-500 tracking-wide mb-0.5">Сеты</span>
                                    <span class="text-sm font-bold text-slate-800 dark:text-slate-200">${currentEx.sets}</span>
                                </div>
                                <div class="flex flex-col text-right">
                                    <span class="text-[10px] uppercase font-bold text-slate-400 dark:text-slate-500 tracking-wide mb-0.5">Цель</span>
                                    <span class="text-sm font-bold text-teal-600 dark:text-teal-400">${currentEx.target} ${unit}</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2 mt-1">
                                <div class="relative flex-grow">
                                    <input type="number" inputmode="decimal" placeholder="${ph}" value="${savedData.weight}" 
                                           onchange="Storage.saveWeight('${ex.id}', '${variantIndex}', this.value)"
                                           class="w-full py-2.5 pl-3 pr-10 rounded-lg text-sm font-bold text-slate-900 dark:text-white bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 placeholder-slate-300 dark:placeholder-slate-500 focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 outline-none transition-all shadow-sm">
                                    <span class="absolute right-3 top-2.5 text-xs font-semibold text-slate-400 dark:text-slate-500 pointer-events-none">${unit}</span>
                                </div>
                                <button onclick="openHistory('${ex.id}', '${variantIndex}', '${currentEx.name.replace(/'/g, "\\'")}', '${unit}')" class="h-10 w-10 flex-shrink-0 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-500 hover:text-teal-600 dark:hover:text-teal-400 active:bg-slate-100 dark:active:bg-slate-700 transition-colors shadow-sm focus:outline-none">
                                    ${historyIcon}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        /* ----- ЭКСПОРТ И ИМПОРТ ----- */
        function exportData() {
            if (navigator.vibrate) navigator.vibrate(20);
            const exportObj = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('freeride_')) exportObj[key] = JSON.parse(localStorage.getItem(key));
            }
            if (Object.keys(exportObj).length === 0) { alert("Нет данных для сохранения."); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "workout_backup.json");
            document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let importedCount = 0;
                    for (const key in importedData) {
                        if (key.startsWith('freeride_')) { localStorage.setItem(key, JSON.stringify(importedData[key])); importedCount++; }
                    }
                    if (importedCount > 0) {
                        alert(`Успешно восстановлено ${importedCount} записей!`);
                        renderCards('push', 'push-grid'); renderCards('pull', 'pull-grid');
                        if (myChartInstance && !document.getElementById('targets').classList.contains('hidden')) renderChart();
                    }
                } catch (error) { alert("Ошибка чтения файла."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        /* ----- ИСТОРИЯ ----- */
        function openHistory(exId, variantIndex, exName, unit) {
            if (navigator.vibrate) navigator.vibrate(20);
            const data = Storage.load(exId, variantIndex);
            const listContainer = document.getElementById('history-list');
            document.getElementById('history-title').innerText = exName;
            listContainer.innerHTML = '';
            
            if (!data.history || data.history.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-6 text-slate-400 dark:text-slate-500 text-sm">История пуста. Запиши свой первый результат!</div>';
            } else {
                const reversedHistory = [...data.history].reverse();
                reversedHistory.forEach(item => {
                    listContainer.insertAdjacentHTML('beforeend', `
                        <div class="flex justify-between items-center py-3 border-b border-slate-100 dark:border-slate-700/50 last:border-0">
                            <span class="text-sm text-slate-500 dark:text-slate-400">${item.date}</span>
                            <span class="font-bold text-slate-800 dark:text-slate-200">${item.weight} ${unit}</span>
                        </div>
                    `);
                });
            }

            const modal = document.getElementById('history-modal');
            const modalContent = document.getElementById('history-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
        }

        function closeHistory() {
            const modal = document.getElementById('history-modal');
            const modalContent = document.getElementById('history-modal-content');
            modal.classList.add('opacity-0'); modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        /* ----- ПРОДВИНУТЫЙ ТАЙМЕР + УВЕДОМЛЕНИЯ И WEB WORKER ----- */
        
        let lastTimerSetting = parseInt(localStorage.getItem('timer_last_setting')) || 90;
        let timerRemaining = lastTimerSetting; 
        
        let isTimerRunning = false;
        let isTimerVisible = false;
        let audioCtx = null;
        let worker = null;

        const workerCode = `
            let timer = null;
            self.onmessage = function(e) {
                if (e.data === 'start') {
                    if(timer) clearInterval(timer);
                    timer = setInterval(() => self.postMessage('tick'), 250);
                } else if (e.data === 'stop') {
                    clearInterval(timer);
                }
            };
        `;
        const blob = new Blob([workerCode], {type: 'application/javascript'});
        worker = new Worker(URL.createObjectURL(blob));
        
        worker.onmessage = function() {
            if (!isTimerRunning) return;
            const now = Date.now();
            const remaining = Math.max(0, Math.ceil((window.timerEndTime - now) / 1000));
            
            if (remaining !== timerRemaining) {
                timerRemaining = remaining;
                updateTimerUI();
            }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep() {
            if (!audioCtx) return;
            
            const playTone = (timeOffset, freq, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + timeOffset);
                
                gain.gain.setValueAtTime(1, audioCtx.currentTime + timeOffset);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + timeOffset + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + timeOffset);
                osc.stop(audioCtx.currentTime + timeOffset + duration);
            };

            playTone(0, 880, 0.4);
            playTone(0.5, 880, 0.4);
            playTone(1.0, 1046.50, 0.6);
        }

        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimerUI() {
            document.getElementById('timer-display').innerText = formatTime(timerRemaining);
            
            const mainBtn = document.getElementById('timer-toggle-btn');
            if (timerRemaining <= 0 && isTimerRunning) {
                mainBtn.classList.add('timer-done');
                
                if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);
                playBeep();

                pauseTimer(); 
            } else {
                mainBtn.classList.remove('timer-done');
            }

            document.getElementById('icon-pause').classList.toggle('hidden', !isTimerRunning);
            document.getElementById('icon-play').classList.toggle('hidden', isTimerRunning);
        }

        function startTimer() {
            initAudio(); 
            
            if (timerRemaining <= 0) timerRemaining = lastTimerSetting; 
            window.timerEndTime = Date.now() + timerRemaining * 1000;
            isTimerRunning = true;
            
            worker.postMessage('start'); 
            updateTimerUI();
        }

        function pauseTimer() {
            isTimerRunning = false;
            worker.postMessage('stop');
            
            const now = Date.now();
            if (window.timerEndTime && window.timerEndTime > now) {
                timerRemaining = Math.ceil((window.timerEndTime - now) / 1000);
            } else {
                timerRemaining = 0;
            }
            updateTimerUI();
        }

        function togglePlayPause() {
            if (navigator.vibrate) navigator.vibrate(10);
            if (isTimerRunning) pauseTimer();
            else startTimer();
        }

        function adjustTimer(amount) {
            initAudio(); 
            if (navigator.vibrate) navigator.vibrate(10);
            timerRemaining += amount;
            if (timerRemaining < 0) timerRemaining = 0;
            
            if (isTimerRunning) {
                window.timerEndTime += amount * 1000;
                if (timerRemaining === 0) pauseTimer();
            }
            updateTimerUI();
        }

        function stopTimer() {
            if (navigator.vibrate) navigator.vibrate(20);
            pauseTimer();
            timerRemaining = lastTimerSetting;
            updateTimerUI();
            document.getElementById('timer-controls').classList.add('hidden');
            isTimerVisible = false;
        }

        function toggleTimer() {
            if (navigator.vibrate) navigator.vibrate(20);
            initAudio(); 
            
            const controls = document.getElementById('timer-controls');
            isTimerVisible = !isTimerVisible;
            
            if (isTimerVisible) {
                controls.classList.remove('hidden');
                if (timerRemaining === 0) timerRemaining = lastTimerSetting;
                updateTimerUI();
            } else {
                controls.classList.add('hidden');
                document.getElementById('timer-toggle-btn').classList.remove('timer-done'); 
            }
        }

        function enableTimerEdit() {
            pauseTimer();
            document.getElementById('timer-display').classList.add('hidden');
            const editContainer = document.getElementById('timer-edit-container');
            editContainer.classList.remove('hidden');
            
            const combinedInput = document.getElementById('timer-input-combined');
            combinedInput.value = formatTime(timerRemaining);
            combinedInput.focus();
            
            setTimeout(() => { 
                combinedInput.setSelectionRange(0, combinedInput.value.length); 
            }, 10);
        }

        function handleCombinedInput(el) {
            let val = el.value.replace(/\D/g, '');
            if (val.length > 4) val = val.slice(-4);
            
            if (val.length === 0) {
                el.value = "";
                return;
            }
            
            let padded = val.padStart(4, '0');
            el.value = padded.slice(0, 2) + ':' + padded.slice(2, 4);
        }

        function saveTimerEdit() {
            const display = document.getElementById('timer-display');
            const editContainer = document.getElementById('timer-edit-container');
            
            if (editContainer.classList.contains('hidden')) return; 

            display.classList.remove('hidden');
            editContainer.classList.add('hidden');
            
            const combinedInput = document.getElementById('timer-input-combined');
            let val = combinedInput.value.replace(/\D/g, '');
            if (val.length === 0) val = "0000";
            
            let padded = val.padStart(4, '0');
            
            let m = parseInt(padded.slice(0, 2), 10) || 0;
            let s = parseInt(padded.slice(2, 4), 10) || 0;
            
            if (s >= 60) {
                m += Math.floor(s / 60);
                s = s % 60;
            }
            
            timerRemaining = m * 60 + s;
            if (timerRemaining <= 0) timerRemaining = 90; 
            
            lastTimerSetting = timerRemaining;
            localStorage.setItem('timer_last_setting', lastTimerSetting);

            updateTimerUI();
        }

        /* ----- НАВИГАЦИЯ И UI ----- */
        function updateVariantToggleUI(dayId, isAlt) {
            const btnA = document.getElementById(`${dayId}-btn-A`);
            const btnB = document.getElementById(`${dayId}-btn-B`);
            const activeClasses = ['bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-teal-600', 'dark:text-teal-400'];
            const inactiveClasses = ['text-slate-500', 'dark:text-slate-400', 'hover:text-slate-700', 'dark:hover:text-slate-200'];

            if (!isAlt) {
                btnA.classList.add(...activeClasses); btnA.classList.remove(...inactiveClasses);
                btnB.classList.add(...inactiveClasses); btnB.classList.remove(...activeClasses);
            } else {
                btnB.classList.add(...activeClasses); btnB.classList.remove(...inactiveClasses);
                btnA.classList.add(...inactiveClasses); btnA.classList.remove(...activeClasses);
            }
        }

        window.toggleExercise = function(dayId, exId, containerId) {
            if (navigator.vibrate) navigator.vibrate(30);
            exerciseState[exId] = !exerciseState[exId];
            renderCards(dayId, containerId);
        };

        window.setAllVariant = function(dayId, isAlt, containerId) {
            if (navigator.vibrate) navigator.vibrate(50);
            workoutData[dayId].forEach((ex) => { exerciseState[ex.id] = isAlt; });
            renderCards(dayId, containerId);
            updateVariantToggleUI(dayId, isAlt);
        };

        const navContainer = document.getElementById('main-nav');
        const navButtons = document.querySelectorAll('#main-nav button');
        const views = document.querySelectorAll('.view-section');

        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (navigator.vibrate) navigator.vibrate(20);

                navButtons.forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
                btn.classList.remove('tab-inactive'); btn.classList.add('tab-active');

                const btnCenter = btn.offsetLeft + (btn.offsetWidth / 2);
                const navCenter = navContainer.offsetWidth / 2;
                navContainer.scrollTo({ left: btnCenter - navCenter, behavior: 'smooth' });

                const targetId = btn.getAttribute('data-target');
                views.forEach(view => {
                    if (view.id === targetId) {
                        view.classList.remove('hidden');
                        if(targetId === 'targets') renderChart(); 
                    } else { view.classList.add('hidden'); }
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        /* ----- ГРАФИК ----- */
        function renderChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            
            const currentLeg = parseFloat(Storage.load('pu_1', 'A').weight) || 100;
            const currentBench = parseFloat(Storage.load('pu_4', 'A').weight) || 50;
            const currentHip = parseFloat(Storage.load('pl_1', 'A').weight) || 60;
            const currentRow = parseFloat(Storage.load('pl_3', 'A').weight) || 30;

            const data = {
                labels: ['Жим Ногами', 'Жим Гантелей', 'Ягодичный Мост', 'Тяга (упор)'],
                datasets: [
                    { label: 'Твой рабочий вес (кг)', data: [currentLeg, currentBench, currentHip, currentRow], backgroundColor: isDark ? '#475569' : '#cbd5e1', borderRadius: 4, barPercentage: 0.6, categoryPercentage: 0.8 },
                    { label: 'Цель Эксперта (кг)', data: [150, 50, 110, 45], backgroundColor: isDark ? '#2dd4bf' : '#0d9488', borderRadius: 4, barPercentage: 0.6, categoryPercentage: 0.8 }
                ]
            };

            const config = {
                type: 'bar', data: data,
                options: {
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'top', labels: { color: isDark ? '#cbd5e1' : '#475569', font: { family: "'Inter', sans-serif", size: 11 }, boxWidth: 10 } },
                        tooltip: { backgroundColor: isDark ? 'rgba(30, 41, 59, 0.95)' : 'rgba(15, 23, 42, 0.95)', titleColor: '#f8fafc', bodyColor: '#f8fafc', titleFont: { family: "'Inter', sans-serif", size: 12 }, padding: 10, cornerRadius: 8 }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: isDark ? '#334155' : '#f1f5f9', drawBorder: false }, ticks: { color: isDark ? '#cbd5e1' : '#475569', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: isDark ? '#cbd5e1' : '#475569', font: { size: 10 }, maxRotation: 45, minRotation: 0 } }
                    },
                    animation: { duration: 500, easing: 'easeOutQuart' }
                }
            };
            
            if (myChartInstance) myChartInstance.destroy();
            myChartInstance = new Chart(ctx, config);
        }

        /* ----- ИНИЦИАЛИЗАЦИЯ И ТЕМА ----- */
        const themeToggleBtn = document.getElementById('theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate(20);
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateMetaThemeColor(isDark); 
            if(myChartInstance && !document.getElementById('targets').classList.contains('hidden')) renderChart();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            
            updateMetaThemeColor(isDark); 
            renderCards('push', 'push-grid');
            renderCards('pull', 'pull-grid');
            
            updateTimerUI();
        });

        document.getElementById('history-modal').addEventListener('click', function(e) {
            if (e.target === this) closeHistory();
        });

    </script>
</body>
</html>
