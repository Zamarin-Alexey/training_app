<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d9488">
    
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMDAiIGZpbGw9IiMwZDk0ODgiLz48cGF0aCBkPSJNMTYwIDM4MCBMMjU2IDE2MCBMMzUyIDM4MCBNMjEwIDMwMCBMMzAyIDMwMCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyNSIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PHBhdGggZD0iTTEyMCA0MjAgUSAyNTYgNDUwIDM5MiA0MjAiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMTUiIGZpbGw9Im5vbmUiLz48L3N2Zz4=" type="image/svg+xml">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMDAiIGZpbGw9IiMwZDk0ODgiLz48cGF0aCBkPSJNMTYwIDM4MCBMMjU2IDE2MCBMMzUyIDM4MCBNMjEwIDMwMCBMMzAyIDMwMCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyNSIgZmlsbD0ibm9uZSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PHBhdGggZD0iTTEyMCA0MjAgUSAyNTYgNDUwIDM5MiA0MjAiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iMTUiIGZpbGw9Im5vbmUiLz48L3N2Zz4=">

    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjogIkZyZWVyaWRlIFBybyIsICJzaG9ydF9uYW1lIjogIkZyZWVyaWRlIiwgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmOGZhZmMiLCAidGhlbWVfY29sb3ciOiAiIzBkOTQ4OCJ9">
    
    <title>Freeride Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { border-bottom: 3px solid #0d9488; color: #0d9488; font-weight: 700; }
        .dark .tab-active { border-bottom: 3px solid #2dd4bf; color: #2dd4bf; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #64748b; }
        .chart-container { position: relative; width: 100%; height: 280px; }
        @media (min-width: 768px) { .chart-container { height: 400px; } }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased">

    <header class="sticky top-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm border-b dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 pt-4 pb-2">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 class="text-xl font-black text-slate-900 dark:text-white leading-tight">🏂 Freeride <span class="text-teal-600 dark:text-teal-400">Pro</span></h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Training Log</p>
                </div>
                <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-lg leading-none transition-transform active:scale-90">🌙</button>
            </div>
            <nav class="flex overflow-x-auto no-scrollbar space-x-6 pb-1" id="main-nav">
                <button class="pb-2 whitespace-nowrap tab-active text-sm focus:outline-none" data-target="push">Толкай</button>
                <button class="pb-2 whitespace-nowrap tab-inactive text-sm focus:outline-none" data-target="pull">Тяни</button>
                <button class="pb-2 whitespace-nowrap tab-inactive text-sm focus:outline-none" data-target="targets">Прогресс</button>
                <button class="pb-2 whitespace-nowrap tab-inactive text-sm focus:outline-none" data-target="audit">Аудит</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6 pb-24">
        <div id="views-container">
            
            <div id="push" class="view-section">
                <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 mb-6 flex justify-between items-center shadow-sm">
                    <span class="text-xs font-bold text-slate-500">Цикл тренировки:</span>
                    <div class="flex gap-2">
                        <button onclick="setAllBlock('push', false, 'push-grid')" class="px-3 py-1 bg-slate-100 dark:bg-slate-700 text-xs font-bold rounded-lg border dark:border-slate-600">Блок А</button>
                        <button onclick="setAllBlock('push', true, 'push-grid')" class="px-3 py-1 bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-xs font-bold rounded-lg border border-amber-100 dark:border-amber-900/50">Блок Б</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="push-grid"></div>
            </div>

            <div id="pull" class="view-section hidden">
                <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 mb-6 flex justify-between items-center shadow-sm">
                    <span class="text-xs font-bold text-slate-500">Цикл тренировки:</span>
                    <div class="flex gap-2">
                        <button onclick="setAllBlock('pull', false, 'pull-grid')" class="px-3 py-1 bg-slate-100 dark:bg-slate-700 text-xs font-bold rounded-lg border dark:border-slate-600">Блок А</button>
                        <button onclick="setAllBlock('pull', true, 'pull-grid')" class="px-3 py-1 bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-xs font-bold rounded-lg border border-amber-100 dark:border-amber-900/50">Блок Б</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="pull-grid"></div>
            </div>

            <div id="targets" class="view-section hidden">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm mb-6">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Динамика весов</h3>
                    <div class="chart-container">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="audit" class="view-section hidden">
                <div class="bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-100 dark:border-emerald-900 p-4 rounded-xl">
                    <h4 class="text-emerald-800 dark:text-emerald-400 font-bold mb-2 uppercase text-xs tracking-widest">Безопасность (Сколиоз 3)</h4>
                    <ul class="text-sm space-y-2 text-emerald-900/70 dark:text-emerald-400/70">
                        <li>• Икры строго сидя/лежа.</li>
                        <li>• Жим ногами: поясница прижата.</li>
                        <li>• Махи дельт: только сидя с опорой.</li>
                        <li>• Тяга спины: только с упором грудью.</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        const Storage = {
            save: (id, block, field, val) => {
                const data = JSON.parse(localStorage.getItem(`fr_${id}_${block}`) || '{"w":"","r":""}');
                data[field] = val;
                localStorage.setItem(`fr_${id}_${block}`, JSON.stringify(data));
                if (myChart) updateChart();
            },
            load: (id, block) => JSON.parse(localStorage.getItem(`fr_${id}_${block}`) || '{"w":"","r":""}')
        };

        const workoutData = {
            push: [
                { id: "pu1", m: "Квадрицепс", a: {n:"Жим платформы", s:"4х10", t:"150"}, b: {n:"Жим одной ногой", s:"3х12", t:"75"} },
                { id: "pu2", m: "Икры", a: {n:"Жим носками (лежа)", s:"4х20", t:"100"}, b: {n:"Подъемы сидя", s:"4х20", t:"40"} },
                { id: "pu3", m: "Грудь", a: {n:"Жим гантелей", s:"4х10", t:"25"}, b: {n:"Жим гантелей (30°)", s:"4х12", t:"22"} },
                { id: "pu4", m: "Дельты", a: {n:"Махи сидя", s:"3х15", t:"12"}, b: {n:"Махи в кроссовере", s:"3х15", t:"10"} },
                { id: "pu5", m: "Трицепс", a: {n:"Блок (канат)", s:"3х12", t:"30"}, b: {n:"Франц. жим гант.", s:"3х12", t:"12"} },
                { id: "pu6", m: "Кор", a: {n:"RKC Планка", s:"3х60с", t:"60"}, b: {n:"Dead Bug", s:"3х20", t:"10"} }
            ],
            pull: [
                { id: "pl1", m: "Ягодицы", a: {n:"Hip Thrust", s:"4х10", t:"110"}, b: {n:"Тяга между ног", s:"3х15", t:"50"} },
                { id: "pl2", m: "Бицепс бедра", a: {n:"Сгибания лежа", s:"3х15", t:"50"}, b: {n:"Сгибания сидя", s:"3х15", t:"55"} },
                { id: "pl3", m: "Спина (Гор.)", a: {n:"Тяга (упор грудью)", s:"4х12", t:"22"}, b: {n:"Тяга блока сидя", s:"4х12", t:"60"} },
                { id: "pl4", m: "Спина (Верт.)", a: {n:"Подтягивания", s:"4х8", t:"0"}, b: {n:"Тяга к груди", s:"4х12", t:"65"} },
                { id: "pl5", m: "Задняя дельта", a: {n:"Face Pulls", s:"3х15", t:"25"}, b: {n:"Махи в наклоне", s:"3х15", t:"8"} },
                { id: "pl6", m: "Бицепс", a: {n:"Гантели сидя", s:"3х12", t:"15"}, b: {n:"Молотки (канат)", s:"3х12", t:"30"} }
            ]
        };

        const state = {};
        let myChart = null;

        function render(day, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            workoutData[day].forEach(ex => {
                if (state[ex.id] === undefined) state[ex.id] = false;
                const block = state[ex.id] ? 'B' : 'A';
                const cur = state[ex.id] ? ex.b : ex.a;
                const log = Storage.load(ex.id, block);
                const border = state[ex.id] ? 'border-amber-200 dark:border-amber-900/50' : 'border-slate-200 dark:border-slate-700';

                grid.innerHTML += `
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border ${border} shadow-sm transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-black text-teal-600 dark:text-teal-400 uppercase">${ex.m}</span>
                            <button onclick="toggle('${day}','${ex.id}','${gridId}')" class="text-[10px] font-bold bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-md border dark:border-slate-600">Блок ${block} ↻</button>
                        </div>
                        <h4 class="text-sm font-bold mb-1">${cur.n}</h4>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <div class="relative">
                                <input type="number" value="${log.w}" oninput="Storage.save('${ex.id}','${block}','w',this.value)" placeholder="Вес" class="w-full bg-slate-50 dark:bg-slate-900 p-2 rounded-lg text-sm font-bold text-center outline-none border border-transparent focus:border-teal-500">
                                <span class="absolute right-2 bottom-2 text-[8px] text-slate-400 uppercase">кг</span>
                            </div>
                            <div class="relative">
                                <input type="number" value="${log.r}" oninput="Storage.save('${ex.id}','${block}','r',this.value)" placeholder="Раз" class="w-full bg-slate-50 dark:bg-slate-900 p-2 rounded-lg text-sm font-bold text-center outline-none border border-transparent focus:border-teal-500">
                                <span class="absolute right-2 bottom-2 text-[8px] text-slate-400 uppercase">повт</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.toggle = (day, id, grid) => { state[id] = !state[id]; render(day, grid); };
        window.setAllBlock = (day, val, grid) => { workoutData[day].forEach(ex => state[ex.id] = val); render(day, grid); };

        const navBtns = document.querySelectorAll('#main-nav button');
        navBtns.forEach(btn => btn.addEventListener('click', () => {
            navBtns.forEach(b => b.className = 'pb-2 whitespace-nowrap tab-inactive text-sm focus:outline-none');
            btn.className = 'pb-2 whitespace-nowrap tab-active text-sm focus:outline-none';
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            const target = document.getElementById(btn.dataset.target);
            target.classList.remove('hidden');
            if (btn.dataset.target === 'targets') updateChart();
        }));

        function updateChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            const data = {
                labels: ['Жим Ног', 'Жим Гант.', 'Ягод. Мост', 'Тяга Спины'],
                datasets: [
                    { label: 'Сейчас', data: [Storage.load('pu1','A').w||100, Storage.load('pu3','A').w||50, Storage.load('pl1','A').w||60, Storage.load('pl3','A').w||30], backgroundColor: isDark ? '#475569' : '#cbd5e1', borderRadius: 5 },
                    { label: 'Цель', data: [150, 50, 110, 45], backgroundColor: '#0d9488', borderRadius: 5 }
                ]
            };
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'bar', data, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: isDark ? '#334155' : '#f1f5f9' } } } } });
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
            if (myChart) updateChart();
        });

        render('push', 'push-grid');
        render('pull', 'pull-grid');
    </script>
</body>
</html>
